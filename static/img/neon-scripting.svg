<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="terminalFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dcfce7" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="lineAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#86efac" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0.75" />
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @keyframes blinkA { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
      @keyframes blinkB { 0%, 100% { opacity: 0.7; } 50% { opacity: 0.08; } }
      @keyframes floatA { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
      @keyframes cursorBlink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: 0.06; } }
      @keyframes pulse { 0%, 100% { opacity: 0.42; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes sweep { 0% { transform: translateX(-30px); opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { transform: translateX(30px); opacity: 0; } }

      .starA { animation: blinkA 3.4s ease-in-out infinite; }
      .starB { animation: blinkB 4.8s ease-in-out infinite; }
      .floatA { animation: floatA 10s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .cursor { animation: cursorBlink 1.1s steps(1) infinite; }
      .pulse { animation: pulse 3.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .sweep { animation: sweep 3.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }

      @media (prefers-reduced-motion: reduce) {
        .starA, .starB, .floatA, .cursor, .pulse, .sweep {
          animation: none !important;
        }
      }
    </style>
  </defs>

  <circle cx="112" cy="64" r="1" fill="#bbf7d0" class="starA" />
  <circle cx="1042" cy="58" r="1" fill="#bbf7d0" class="starA" />
  <circle cx="968" cy="96" r="0.8" fill="#d9f99d" class="starB" />

  <g class="floatA" filter="url(#softGlow)">
    <rect x="170" y="84" width="860" height="232" rx="30" fill="url(#terminalFill)" stroke="#86efac" stroke-opacity="0.34" stroke-width="1.4" />
    <line x1="170" y1="120" x2="1030" y2="120" stroke="#86efac" stroke-opacity="0.16" stroke-width="1" />
    <circle cx="202" cy="102" r="5" fill="#bbf7d0" fill-opacity="0.62" />
    <circle cx="220" cy="102" r="5" fill="#d9f99d" fill-opacity="0.5" />
    <circle cx="238" cy="102" r="5" fill="#4ade80" fill-opacity="0.56" />

    <text x="242" y="170" fill="#dcfce7" font-size="22" font-family="JetBrains Mono, monospace">$ ./backup.sh --env prod</text>
    <text x="242" y="206" fill="#86efac" font-size="22" font-family="JetBrains Mono, monospace">find logs -name "*.json" | jq '.items[]'</text>
    <text x="242" y="242" fill="#bbf7d0" font-size="22" font-family="JetBrains Mono, monospace">sort | uniq > report.txt</text>
    <text x="242" y="278" fill="#dcfce7" fill-opacity="0.74" font-size="18" font-family="JetBrains Mono, monospace">exit 0</text>
    <rect x="822" y="188" width="10" height="24" rx="2" fill="#dcfce7" class="cursor" />

    <line x1="242" y1="290" x2="928" y2="290" stroke="#86efac" stroke-opacity="0.14" stroke-width="1" />
    <rect x="262" y="140" width="130" height="18" rx="9" fill="#22c55e" fill-opacity="0.08" class="sweep" />
  </g>

  <g class="pulse" filter="url(#softGlow)">
    <rect x="136" y="164" width="42" height="72" rx="16" fill="#bbf7d0" fill-opacity="0.1" stroke="#86efac" stroke-opacity="0.28" stroke-width="1.1" />
    <text x="157" y="208" fill="#dcfce7" font-size="22" text-anchor="middle" font-family="JetBrains Mono, monospace">$</text>
  </g>

  <g class="pulse" filter="url(#softGlow)">
    <rect x="1042" y="144" width="66" height="32" rx="16" fill="#22c55e" fill-opacity="0.14" stroke="#86efac" stroke-opacity="0.28" stroke-width="1" />
    <rect x="1042" y="186" width="54" height="32" rx="16" fill="#22c55e" fill-opacity="0.14" stroke="#86efac" stroke-opacity="0.28" stroke-width="1" />
    <rect x="1042" y="228" width="82" height="32" rx="16" fill="#22c55e" fill-opacity="0.14" stroke="#86efac" stroke-opacity="0.28" stroke-width="1" />
  </g>

  <line x1="1040" y1="160" x2="1112" y2="160" stroke="url(#lineAccent)" stroke-width="2.2" stroke-linecap="round" />
  <line x1="1040" y1="202" x2="1090" y2="202" stroke="url(#lineAccent)" stroke-width="2.2" stroke-linecap="round" />
  <line x1="1040" y1="244" x2="1118" y2="244" stroke="url(#lineAccent)" stroke-width="2.2" stroke-linecap="round" />
</svg>
