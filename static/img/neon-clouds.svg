<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Cloud gradients - green palette -->
    <linearGradient id="cloudGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.18" />
    </linearGradient>
    <linearGradient id="cloudGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86efac" stop-opacity="0.32" />
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0.12" />
    </linearGradient>
    <linearGradient id="cloudGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bbf7d0" stop-opacity="0.38" />
      <stop offset="100%" stop-color="#86efac" stop-opacity="0.14" />
    </linearGradient>
    <linearGradient id="cloudGradFg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.22" />
    </linearGradient>
    <linearGradient id="cloudGradFg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86efac" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.2" />
    </linearGradient>

    <!-- Glow filter for stars -->
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Stronger glow for accent stars -->
    <filter id="starGlowBright" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft cloud edge glow -->
    <filter id="cloudEdgeGlow" x="-3%" y="-3%" width="106%" height="112%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @keyframes blink1 { 0%, 100% { opacity: 0.15; } 50% { opacity: 1; } }
      @keyframes blink2 { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.1; } }
      @keyframes blink3 { 0%, 100% { opacity: 0.5; } 30% { opacity: 1; } 70% { opacity: 0.08; } }
      @keyframes blink4 { 0%, 100% { opacity: 0.25; } 40% { opacity: 0.95; } 60% { opacity: 0.05; } }
      @keyframes drift1 { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(12px); } }
      @keyframes drift2 { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-10px); } }
      @keyframes drift3 { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(8px); } }
      .sa { animation: blink1 3s ease-in-out infinite; }
      .sb { animation: blink2 4.2s ease-in-out infinite; }
      .sc { animation: blink3 2.6s ease-in-out infinite; }
      .sd { animation: blink4 5.1s ease-in-out infinite; }
      .se { animation: blink1 3.7s ease-in-out infinite; }
      .sf { animation: blink2 2.1s ease-in-out infinite; }
      .cd1 { animation: drift1 22s ease-in-out infinite; }
      .cd2 { animation: drift2 28s ease-in-out infinite; }
      .cd3 { animation: drift3 18s ease-in-out infinite; }
    </style>
  </defs>

  <!-- ============================================== -->
