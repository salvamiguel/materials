<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="panelFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dcfce7" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#86efac" stop-opacity="0.18" />
      <stop offset="50%" stop-color="#4ade80" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#bbf7d0" stop-opacity="0.18" />
    </linearGradient>
    <radialGradient id="syncGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#f0fdf4" stop-opacity="0.95" />
      <stop offset="42%" stop-color="#86efac" stop-opacity="0.48" />
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.05" />
    </radialGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @keyframes blinkA { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
      @keyframes blinkB { 0%, 100% { opacity: 0.7; } 50% { opacity: 0.08; } }
      @keyframes floatA { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
      @keyframes floatB { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(8px); } }
      @keyframes dashFlow { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -72; } }
      @keyframes pulse { 0%, 100% { opacity: 0.42; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

      .starA { animation: blinkA 3.2s ease-in-out infinite; }
      .starB { animation: blinkB 4.4s ease-in-out infinite; }
      .floatA { animation: floatA 10s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .floatB { animation: floatB 12s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .flow { stroke-dasharray: 12 14; animation: dashFlow 3.8s linear infinite; }
      .pulse { animation: pulse 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .spin { animation: spin 16s linear infinite; transform-box: fill-box; transform-origin: center; }

      @media (prefers-reduced-motion: reduce) {
        .starA, .starB, .floatA, .floatB, .flow, .pulse, .spin {
          animation: none !important;
        }
      }
    </style>
  </defs>

  <circle cx="92" cy="54" r="1" fill="#bbf7d0" class="starA" />
  <circle cx="190" cy="84" r="0.8" fill="#d9f99d" class="starB" />
  <circle cx="1012" cy="60" r="1" fill="#bbf7d0" class="starA" />
  <circle cx="1102" cy="92" r="0.8" fill="#d9f99d" class="starB" />

  <g class="floatA" filter="url(#softGlow)">
    <rect x="120" y="122" width="240" height="156" rx="28" fill="url(#panelFill)" stroke="#86efac" stroke-opacity="0.34" stroke-width="1.4" />
    <line x1="120" y1="156" x2="360" y2="156" stroke="#86efac" stroke-opacity="0.16" stroke-width="1" />
    <circle cx="148" cy="140" r="4.5" fill="#bbf7d0" fill-opacity="0.62" />
    <circle cx="164" cy="140" r="4.5" fill="#d9f99d" fill-opacity="0.5" />
    <circle cx="180" cy="140" r="4.5" fill="#4ade80" fill-opacity="0.56" />

    <path d="M 180 236 V 188 C 180 180 186 174 194 174 H 246" fill="none" stroke="#86efac" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 246 174 H 296 C 304 174 310 180 310 188 V 226" fill="none" stroke="#4ade80" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 246 174 V 210 C 246 218 252 224 260 224 H 310" fill="none" stroke="#bbf7d0" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />

    <circle cx="180" cy="236" r="7" fill="#08140d" stroke="#86efac" stroke-width="1.4" />
    <circle cx="246" cy="174" r="7" fill="#08140d" stroke="#bbf7d0" stroke-width="1.4" />
    <circle cx="310" cy="226" r="7" fill="#08140d" stroke="#4ade80" stroke-width="1.4" />
    <circle cx="310" cy="188" r="7" fill="#08140d" stroke="#86efac" stroke-width="1.4" />
    <circle cx="180" cy="236" r="2.5" fill="#dcfce7" />
    <circle cx="246" cy="174" r="2.5" fill="#f0fdf4" />
    <circle cx="310" cy="226" r="2.5" fill="#dcfce7" />
    <circle cx="310" cy="188" r="2.5" fill="#dcfce7" />
  </g>

  <path d="M 360 200 C 420 200, 462 182, 512 184" fill="none" stroke="#22c55e" stroke-opacity="0.14" stroke-width="12" stroke-linecap="round" />
  <path d="M 360 200 C 420 200, 462 182, 512 184" fill="none" stroke="url(#lineGlow)" stroke-width="3" stroke-linecap="round" class="flow" filter="url(#softGlow)" />

  <g class="floatB">
    <circle cx="600" cy="200" r="74" fill="none" stroke="#4ade80" stroke-opacity="0.08" stroke-width="16" />
    <circle cx="600" cy="200" r="52" fill="url(#syncGlow)" filter="url(#softGlow)" />
    <g class="spin">
      <circle cx="600" cy="200" r="66" fill="none" stroke="#bbf7d0" stroke-opacity="0.34" stroke-width="1.4" stroke-dasharray="6 12" />
    </g>
    <circle cx="600" cy="200" r="4.8" fill="#f0fdf4" filter="url(#softGlow)" />
    <path d="M 570 194 A 32 32 0 0 1 616 164" fill="none" stroke="#dcfce7" stroke-width="2.4" stroke-linecap="round" />
    <polygon points="616,160 624,165 615,171" fill="#dcfce7" />
    <path d="M 630 206 A 32 32 0 0 1 584 236" fill="none" stroke="#bbf7d0" stroke-width="2.4" stroke-linecap="round" />
    <polygon points="584,240 576,235 585,229" fill="#bbf7d0" />
    <circle cx="536" cy="200" r="4.2" fill="#dcfce7" class="pulse" filter="url(#softGlow)" />
    <circle cx="664" cy="200" r="4.2" fill="#bbf7d0" class="pulse" filter="url(#softGlow)" />
  </g>

  <path d="M 688 200 C 740 200, 784 184, 840 184" fill="none" stroke="#22c55e" stroke-opacity="0.14" stroke-width="12" stroke-linecap="round" />
  <path d="M 688 200 C 740 200, 784 184, 840 184" fill="none" stroke="url(#lineGlow)" stroke-width="3" stroke-linecap="round" class="flow" filter="url(#softGlow)" />

  <g class="floatA" filter="url(#softGlow)">
    <rect x="840" y="110" width="240" height="176" rx="28" fill="url(#panelFill)" stroke="#86efac" stroke-opacity="0.34" stroke-width="1.4" />
    <line x1="840" y1="144" x2="1080" y2="144" stroke="#86efac" stroke-opacity="0.16" stroke-width="1" />
    <circle cx="868" cy="128" r="4.5" fill="#bbf7d0" fill-opacity="0.62" />
    <circle cx="884" cy="128" r="4.5" fill="#d9f99d" fill-opacity="0.5" />
    <circle cx="900" cy="128" r="4.5" fill="#4ade80" fill-opacity="0.56" />

    <rect x="888" y="174" width="144" height="22" rx="11" fill="#bbf7d0" fill-opacity="0.08" stroke="#86efac" stroke-opacity="0.24" stroke-width="1" />
    <rect x="888" y="208" width="144" height="22" rx="11" fill="#bbf7d0" fill-opacity="0.08" stroke="#86efac" stroke-opacity="0.24" stroke-width="1" />
    <rect x="888" y="242" width="144" height="22" rx="11" fill="#bbf7d0" fill-opacity="0.08" stroke="#86efac" stroke-opacity="0.24" stroke-width="1" />

    <circle cx="914" cy="185" r="5" fill="#dcfce7" class="pulse" filter="url(#softGlow)" />
    <circle cx="914" cy="219" r="5" fill="#dcfce7" class="pulse" filter="url(#softGlow)" />
    <circle cx="914" cy="253" r="5" fill="#dcfce7" class="pulse" filter="url(#softGlow)" />
    <line x1="934" y1="185" x2="998" y2="185" stroke="#bbf7d0" stroke-opacity="0.68" stroke-width="2.2" stroke-linecap="round" />
    <line x1="934" y1="219" x2="1012" y2="219" stroke="#bbf7d0" stroke-opacity="0.52" stroke-width="2.2" stroke-linecap="round" />
    <line x1="934" y1="253" x2="990" y2="253" stroke="#bbf7d0" stroke-opacity="0.58" stroke-width="2.2" stroke-linecap="round" />
  </g>
</svg>
