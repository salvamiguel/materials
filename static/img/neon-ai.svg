<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="panelFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dcfce7" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="beamGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#86efac" stop-opacity="0.12" />
      <stop offset="50%" stop-color="#4ade80" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#bbf7d0" stop-opacity="0.12" />
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="68%">
      <stop offset="0%" stop-color="#f0fdf4" stop-opacity="0.98" />
      <stop offset="34%" stop-color="#bbf7d0" stop-opacity="0.78" />
      <stop offset="64%" stop-color="#4ade80" stop-opacity="0.38" />
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.04" />
    </radialGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @keyframes blinkA { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
      @keyframes blinkB { 0%, 100% { opacity: 0.7; } 50% { opacity: 0.08; } }
      @keyframes floatA { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
      @keyframes floatB { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(8px); } }
      @keyframes pulse { 0%, 100% { opacity: 0.45; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

      .starA { animation: blinkA 3.2s ease-in-out infinite; }
      .starB { animation: blinkB 4.6s ease-in-out infinite; }
      .floatA { animation: floatA 10s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .floatB { animation: floatB 12s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .pulse { animation: pulse 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .spin { animation: spin 18s linear infinite; transform-box: fill-box; transform-origin: center; }

      @media (prefers-reduced-motion: reduce) {
        .starA, .starB, .floatA, .floatB, .pulse, .spin {
          animation: none !important;
        }
      }
    </style>
  </defs>

  <circle cx="110" cy="60" r="1" fill="#bbf7d0" class="starA" />
  <circle cx="1034" cy="58" r="1" fill="#bbf7d0" class="starA" />
  <circle cx="950" cy="96" r="0.8" fill="#d9f99d" class="starB" />

  <g class="floatA" filter="url(#softGlow)">
    <rect x="120" y="128" width="220" height="116" rx="26" fill="url(#panelFill)" stroke="#86efac" stroke-opacity="0.34" stroke-width="1.4" />
    <line x1="120" y1="160" x2="340" y2="160" stroke="#86efac" stroke-opacity="0.16" stroke-width="1" />
    <circle cx="148" cy="144" r="4.5" fill="#bbf7d0" fill-opacity="0.62" />
    <circle cx="164" cy="144" r="4.5" fill="#d9f99d" fill-opacity="0.5" />
    <circle cx="180" cy="144" r="4.5" fill="#4ade80" fill-opacity="0.56" />
    <line x1="154" y1="190" x2="286" y2="190" stroke="#bbf7d0" stroke-opacity="0.72" stroke-width="2.4" stroke-linecap="round" />
    <line x1="154" y1="208" x2="264" y2="208" stroke="#bbf7d0" stroke-opacity="0.52" stroke-width="2.4" stroke-linecap="round" />
    <line x1="154" y1="226" x2="300" y2="226" stroke="#bbf7d0" stroke-opacity="0.58" stroke-width="2.4" stroke-linecap="round" />
  </g>

  <line x1="340" y1="186" x2="494" y2="186" stroke="#22c55e" stroke-opacity="0.12" stroke-width="12" stroke-linecap="round" />
  <line x1="340" y1="186" x2="494" y2="186" stroke="url(#beamGlow)" stroke-width="3" stroke-linecap="round" filter="url(#softGlow)" />

  <g class="floatB">
    <circle cx="600" cy="200" r="84" fill="none" stroke="#4ade80" stroke-opacity="0.08" stroke-width="18" />
    <circle cx="600" cy="200" r="56" fill="url(#coreGlow)" filter="url(#softGlow)" />
    <g class="spin">
      <circle cx="600" cy="200" r="92" fill="none" stroke="#bbf7d0" stroke-opacity="0.34" stroke-width="1.4" stroke-dasharray="7 14" />
    </g>
    <circle cx="600" cy="200" r="6" fill="#f0fdf4" filter="url(#softGlow)" />

    <circle cx="560" cy="160" r="5.5" fill="#dcfce7" class="pulse" />
    <circle cx="640" cy="160" r="5.5" fill="#dcfce7" class="pulse" />
    <circle cx="656" cy="208" r="5.5" fill="#dcfce7" class="pulse" />
    <circle cx="616" cy="246" r="5.5" fill="#dcfce7" class="pulse" />
    <circle cx="548" cy="232" r="5.5" fill="#dcfce7" class="pulse" />
    <circle cx="536" cy="184" r="5.5" fill="#dcfce7" class="pulse" />

    <line x1="600" y1="200" x2="560" y2="160" stroke="#86efac" stroke-opacity="0.64" stroke-width="1.8" />
    <line x1="600" y1="200" x2="640" y2="160" stroke="#86efac" stroke-opacity="0.64" stroke-width="1.8" />
    <line x1="600" y1="200" x2="656" y2="208" stroke="#86efac" stroke-opacity="0.64" stroke-width="1.8" />
    <line x1="600" y1="200" x2="616" y2="246" stroke="#86efac" stroke-opacity="0.64" stroke-width="1.8" />
    <line x1="600" y1="200" x2="548" y2="232" stroke="#86efac" stroke-opacity="0.64" stroke-width="1.8" />
    <line x1="600" y1="200" x2="536" y2="184" stroke="#86efac" stroke-opacity="0.64" stroke-width="1.8" />
  </g>

  <line x1="706" y1="186" x2="860" y2="186" stroke="#22c55e" stroke-opacity="0.12" stroke-width="12" stroke-linecap="round" />
  <line x1="706" y1="186" x2="860" y2="186" stroke="url(#beamGlow)" stroke-width="3" stroke-linecap="round" filter="url(#softGlow)" />

  <g class="floatA" filter="url(#softGlow)">
    <rect x="860" y="120" width="220" height="132" rx="26" fill="url(#panelFill)" stroke="#86efac" stroke-opacity="0.34" stroke-width="1.4" />
    <line x1="860" y1="152" x2="1080" y2="152" stroke="#86efac" stroke-opacity="0.16" stroke-width="1" />
    <circle cx="888" cy="136" r="4.5" fill="#bbf7d0" fill-opacity="0.62" />
    <circle cx="904" cy="136" r="4.5" fill="#d9f99d" fill-opacity="0.5" />
    <circle cx="920" cy="136" r="4.5" fill="#4ade80" fill-opacity="0.56" />
    <rect x="894" y="182" width="126" height="18" rx="9" fill="#22c55e" fill-opacity="0.14" stroke="#86efac" stroke-opacity="0.24" stroke-width="1" />
    <rect x="894" y="208" width="158" height="18" rx="9" fill="#22c55e" fill-opacity="0.14" stroke="#86efac" stroke-opacity="0.24" stroke-width="1" />
    <rect x="894" y="234" width="94" height="18" rx="9" fill="#22c55e" fill-opacity="0.14" stroke="#86efac" stroke-opacity="0.24" stroke-width="1" />
  </g>
</svg>
